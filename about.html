<body><header class="simple-header"><a class="brand" href="index.html">余白スタンド</a><a href="index.html">ホーム</a></header><main class="page"><h1>このブログについて</h1><p>「余白スタンド」は、野球を中心に、ゲームや実際に使った道具について書く個人ブログです。</p><h2>管理人</h2><p>巨人ファンの管理人が運営しています。好きなゲームは、ポケモン、ドラゴンクエスト、パワフルプロ野球です。くわしい自己紹介は、<a href="articles/first-note.html">最初の記事</a>にまとめています。</p><h2>運営方針</h2><p>自分で見たこと、遊んだこと、使ったことをもとに書きます。情報に誤りが見つかった場合は、確認して修正します。</p></main></body>
